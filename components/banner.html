<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Banner di Notifica</title>
  <style>
    .banner {
      display: none; /* nascosto di default */
      background-color: rgb(17, 255, 0); /* colore distintivo */
      text-align: center; /* testo centrato */
      padding: 15px;
      font-weight: bold;
      font-size: 18px;
    }

    .banner.visibile {
      display: block; 
    }

    .dark{
      background-color: black;
      color: rgb(101, 168, 24);
       text-align: center; /* testo centrato merda testa di cazzo*/
      padding: 15px;
      font-weight: bold;
      font-size: 18px;
    }



  </style>
</head>
<body>
    <img src="" alt="">
  <div class="banner" id="myBanner">
    Offerta Speciale: Sconto del 20% su tutti i prodotti! Approfittane ora!
  </div>

  
  <script>

    setTimeout(() => {
      document.getElementById('myBanner').classList.add('visibile');
    }, 2000);
  </script>

</body>
</html>
